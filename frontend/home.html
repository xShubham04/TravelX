<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelX - Book Your Dream Hotel</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <div class="logo">TravelX</div>
        <ul id="nav-links">
            <li><a href="/home.html">Home</a></li>
            <li><a href="/my-bookings.html">My Bookings</a></li>
            <li id="auth-link"><a href="/login.html">Login/Signup</a></li>
        </ul>
    </nav>

    <header>
        <h1>Find Your Next Stay</h1>
        <div class="search-bar">
            <input type="text" id="location-input" placeholder="Enter destination (e.g., Goa, Mumbai)">
            <button onclick="searchHotels()">Search</button>
        </div>
    </header>

    <main>
        <h2>Available Hotels</h2>
        <div id="hotel-list" class="hotel-grid"></div>
    </main>

    <!-- AI Chatbot Bubble -->
    <div id="chat-widget" style="position: fixed; bottom: 20px; right: 20px; z-index: 1000; font-family: 'Segoe UI', sans-serif;">
        <div id="chat-window" style="display: none; width: 300px; height: 400px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); flex-direction: column; overflow: hidden; margin-bottom: 10px;">
            <div style="background: #007bff; color: white; padding: 10px; text-align: center; font-weight: bold;">TravelX AI Agent</div>
            <div id="chat-messages" style="flex: 1; padding: 10px; overflow-y: auto; background: #f8f9fa; display: flex; flex-direction: column; gap: 8px;">
                <div style="background: #e9ecef; padding: 8px 12px; border-radius: 15px; align-self: flex-start; max-width: 80%; font-size: 0.9rem;">Hi! I'm your TravelX AI assistant. Where would you like to travel?</div>
            </div>
            <div style="display: flex; border-top: 1px solid #ddd; padding: 5px;">
                <input type="text" id="chat-input" placeholder="Type a message..." style="flex: 1; border: none; padding: 10px; outline: none;">
                <button onclick="sendChatMessage()" style="background: #007bff; color: white; border: none; padding: 0 15px; cursor: pointer; font-weight: bold;">Send</button>
            </div>
        </div>
        <button onclick="toggleChat()" style="float: right; width: 60px; height: 60px; border-radius: 50%; background: #007bff; color: white; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">🤖</button>
    </div>

    <script src="/js/main.js"></script>
    <script>
        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.style.display = win.style.display === 'none' ? 'flex' : 'none';
        }
        
        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const messages = document.getElementById('chat-messages');
            const userText = input.value.trim();
            if(!userText) return;

            // append user message
            messages.innerHTML += `<div style="background: #007bff; color: white; padding: 8px 12px; border-radius: 15px; align-self: flex-end; max-width: 80%; font-size: 0.9rem;">${userText}</div>`;
            input.value = '';
            messages.scrollTop = messages.scrollHeight;

            // fetch AI reply
            const res = await fetch('/api/chat', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: userText })
            });
            const data = await res.json();
            
            // append AI message
            messages.innerHTML += `<div style="background: #e9ecef; padding: 8px 12px; border-radius: 15px; align-self: flex-start; max-width: 80%; font-size: 0.9rem;">${data.reply || data.error}</div>`;
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
