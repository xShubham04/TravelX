<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelX - My Bookings</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .bookings-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .booking-card {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-left: 5px solid #007bff;
        }
        .booking-card h3 {
            margin-top: 0;
            color: #333;
        }
        .booking-details {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: #555;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .booking-status {
            background: #28a745;
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .no-bookings {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 8px;
            color: #666;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">TravelX</div>
        <ul id="nav-links">
            <li><a href="/home.html">Home</a></li>
            <li><a href="/my-bookings.html">My Bookings</a></li>
            <li id="auth-link"><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <main class="bookings-container">
        <h2>My Bookings</h2>
        <div id="bookings-list">
            <!-- Bookings will be loaded here -->
            <p>Loading your bookings...</p>
        </div>
    </main>

    <script src="/js/my-bookings.js"></script>
    <script>
        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/';
        }
    </script>
</body>
</html>
